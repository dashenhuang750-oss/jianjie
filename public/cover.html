<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e8ecef" />
    <meta name="description" content="黄文浩的个人网站，展示数学建模、统计建模、数据分析、Desmos 可视化、竞赛经历与公共服务经历。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="黄文浩 | 数理建模 · 统计建模 · 数据分析" />
    <meta property="og:description" content="黄文浩的个人网站，展示数学建模、统计建模、数据分析、Desmos 可视化、竞赛经历与公共服务经历。" />
    <title>黄文浩 | 数理建模 · 统计建模 · 数据分析</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #e8ecef;
        --paper-deep: #cfd6da;
        --ink: #101417;
        --muted: rgba(16, 20, 23, 0.62);
        --hairline: rgba(16, 20, 23, 0.34);
        --soft-line: rgba(16, 20, 23, 0.16);
        --white: rgba(255, 255, 255, 0.72);
        --font: "Inter", "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        --serif: "Times New Roman", "Songti SC", SimSun, serif;
        --mx: 0.5;
        --my: 0.5;
        --px: 0px;
        --py: 0px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--paper);
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(203, 211, 216, 0.76)),
          var(--paper);
        font-family: var(--font);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      button,
      a {
        color: inherit;
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      svg {
        display: block;
      }

      .cover-frame {
        position: fixed;
        inset: 28px;
        overflow: hidden;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(246, 248, 248, 0.9), rgba(223, 229, 232, 0.9));
        isolation: isolate;
        animation: frameIn 900ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .cover-frame::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        background:
          linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent 52%),
          repeating-linear-gradient(0deg, rgba(16, 20, 23, 0.018) 0 1px, transparent 1px 4px);
        mix-blend-mode: soft-light;
      }

      .cover-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.32) inset,
          0 30px 90px rgba(13, 24, 32, 0.18) inset;
      }

      .site-nav {
        position: relative;
        z-index: 12;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        min-height: 66px;
        padding: 0 clamp(18px, 3vw, 42px);
        font-size: 14px;
      }

      .wordmark,
      .nav-menu,
      .enter-link {
        display: inline-flex;
        align-items: center;
      }

      .wordmark {
        gap: 8px;
        width: fit-content;
        border: 0;
        background: transparent;
        text-decoration: none;
      }

      .wordmark-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid var(--hairline);
        border-radius: 50%;
        font-family: var(--serif);
        font-size: 18px;
        font-style: italic;
      }

      .wordmark span:last-child {
        font-family: var(--serif);
        font-size: 18px;
      }

      .nav-menu {
        gap: clamp(18px, 4vw, 64px);
        justify-content: center;
      }

      .nav-menu a,
      .enter-link {
        position: relative;
        min-height: 36px;
        border: 0;
        background: transparent;
        text-decoration: none;
      }

      .nav-menu a::after,
      .enter-link::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 6px;
        height: 1px;
        background: currentColor;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 220ms ease;
      }

      .nav-menu a:hover::after,
      .enter-link:hover::after {
        transform: scaleX(1);
      }

      .nav-actions {
        display: flex;
        justify-content: flex-end;
      }

      .enter-link {
        gap: 9px;
        padding: 0;
      }

      .enter-link svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .hero-stage {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      .mountain-layer {
        position: absolute;
        inset: -4% -3% -8%;
        background-image: url("/media/mountain-hero.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center 34%;
        transform:
          translate3d(
            calc((0.5 - var(--mx)) * 28px),
            calc((0.5 - var(--my)) * 18px),
            0
          )
          scale(1.045);
        transition: transform 140ms ease-out;
        will-change: transform;
      }

      .mountain-layer::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(232, 236, 239, 0.36) 0%, rgba(232, 236, 239, 0.18) 31%, rgba(232, 236, 239, 0) 58%),
          linear-gradient(90deg, rgba(232, 236, 239, 0.2), transparent 20%, transparent 78%, rgba(232, 236, 239, 0.22));
      }

      .mountain-layer::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 42%;
        background: linear-gradient(0deg, rgba(6, 9, 11, 0.42), rgba(6, 9, 11, 0));
      }

      .cloud-canvas {
        position: absolute;
        inset: 0;
        z-index: 3;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.58;
        mix-blend-mode: multiply;
      }

      .altitude-line {
        position: absolute;
        z-index: 8;
        left: 50%;
        top: 45%;
        width: 1px;
        height: clamp(76px, 13vh, 132px);
        background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.92), transparent);
        transform:
          translate(-50%, -50%)
          translate3d(calc((var(--mx) - 0.5) * -20px), calc((var(--my) - 0.5) * -12px), 0);
        opacity: 0.78;
      }

      .altitude-line::before,
      .altitude-line::after {
        content: "";
        position: absolute;
        left: 50%;
        width: 9px;
        height: 9px;
        border-left: 1px solid rgba(255, 255, 255, 0.86);
        border-bottom: 1px solid rgba(255, 255, 255, 0.86);
      }

      .altitude-line::before {
        top: -2px;
        transform: translateX(-50%) rotate(135deg);
      }

      .altitude-line::after {
        bottom: -2px;
        transform: translateX(-50%) rotate(-45deg);
      }

      .hero-copy {
        position: relative;
        z-index: 10;
        display: grid;
        justify-items: center;
        gap: 14px;
        width: min(920px, calc(100vw - 64px));
        margin: clamp(84px, 13vh, 140px) auto 0;
        text-align: center;
        transform:
          translate3d(calc((var(--mx) - 0.5) * 14px), calc((var(--my) - 0.5) * 10px), 0);
        transition: transform 160ms ease-out;
      }

      .hero-kicker {
        margin: 0;
        color: var(--muted);
        font-size: clamp(12px, 1.3vw, 15px);
      }

      .hero-title {
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(68px, 12vw, 156px);
        font-style: italic;
        font-weight: 400;
        line-height: 0.88;
        letter-spacing: 0;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.52);
      }

      .hero-line {
        max-width: 620px;
        margin: 2px 0 0;
        color: rgba(247, 250, 251, 0.86);
        font-size: clamp(15px, 1.6vw, 20px);
        line-height: 1.7;
        text-shadow: 0 2px 24px rgba(0, 0, 0, 0.54);
      }

      .enter-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 48px;
        margin-top: 8px;
        padding: 0 18px;
        border: 1px solid rgba(16, 20, 23, 0.42);
        border-radius: 999px;
        color: #f7fafb;
        background: rgba(13, 18, 22, 0.86);
        box-shadow: 0 16px 40px rgba(9, 15, 18, 0.22);
        transition:
          transform 220ms ease,
          background 220ms ease,
          box-shadow 220ms ease;
      }

      .enter-button:hover {
        transform: translateY(-2px);
        background: #050708;
        box-shadow: 0 22px 54px rgba(9, 15, 18, 0.28);
      }

      .enter-button svg {
        width: 19px;
        height: 19px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .edge-caption {
        position: absolute;
        z-index: 10;
        right: clamp(18px, 3vw, 44px);
        bottom: clamp(16px, 3vh, 34px);
        display: grid;
        justify-items: end;
        gap: 4px;
        color: rgba(255, 255, 255, 0.72);
        font-family: var(--serif);
        font-size: clamp(13px, 1.2vw, 16px);
        font-style: italic;
        text-shadow: 0 1px 18px rgba(0, 0, 0, 0.46);
      }

      .edge-caption small {
        color: rgba(255, 255, 255, 0.58);
        font-family: var(--font);
        font-size: 11px;
        font-style: normal;
      }

      .side-index {
        position: absolute;
        z-index: 10;
        left: clamp(16px, 2.5vw, 34px);
        bottom: clamp(16px, 3vh, 34px);
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
        text-transform: uppercase;
        text-shadow: 0 1px 18px rgba(0, 0, 0, 0.48);
      }

      .side-index::before {
        content: "";
        width: 46px;
        height: 1px;
        background: currentColor;
      }

      body.is-exiting .cover-frame {
        animation: coverExit 620ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes frameIn {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.985);
          filter: blur(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes coverExit {
        from {
          opacity: 1;
          transform: scale(1);
          filter: blur(0);
        }
        to {
          opacity: 0;
          transform: scale(1.035);
          filter: blur(12px);
        }
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
          background: var(--paper);
        }

        .cover-frame {
          position: relative;
          inset: auto;
          min-height: calc(100vh - 24px);
          margin: 12px;
        }

        .site-nav {
          grid-template-columns: 1fr auto;
          gap: 12px;
          padding: 0 16px;
        }

        .nav-menu {
          display: none;
        }

        .wordmark span:last-child {
          max-width: 44vw;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .hero-copy {
          width: calc(100vw - 54px);
          margin-top: 96px;
          justify-items: start;
          text-align: left;
        }

        .hero-title {
          font-size: clamp(74px, 22vw, 112px);
        }

        .hero-line {
          max-width: 350px;
          font-size: 15px;
        }

        .mountain-layer {
          inset: -2% -36% -3% -22%;
          background-position: 48% 68%;
        }

        .altitude-line {
          left: 62%;
          top: 48%;
        }

        .side-index {
          display: none;
        }
      }

      @media (max-width: 480px) {
        .cover-frame {
          min-height: calc(100vh - 18px);
          margin: 9px;
        }

        .enter-link span {
          display: none;
        }

        .hero-copy {
          margin-top: 84px;
        }

        .hero-title {
          font-size: clamp(62px, 23vw, 92px);
        }

        .edge-caption {
          left: 16px;
          right: 16px;
          justify-items: start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }

        .mountain-layer,
        .hero-copy,
        .altitude-line {
          transform: none;
        }
      }
    </style>
    <link rel="stylesheet" href="/cover.css?v=1" />
  </head>
  <body>
    <main class="cover-frame" aria-label="黄文浩个人网站封面">
      <div class="hero-stage" aria-hidden="true">
        <div class="mountain-layer"></div>
        <canvas id="cloudCanvas" class="cloud-canvas"></canvas>
        <span class="altitude-line"></span>
      </div>

      <header class="site-nav">
        <a class="wordmark" href="/app" data-enter>
          <span class="wordmark-mark">H</span>
          <span>Huang Wenhao</span>
        </a>

        <nav class="nav-menu" aria-label="主导航">
          <a href="/app" data-enter>Projects</a>
          <a href="/app" data-enter>Skills</a>
          <a href="/app" data-enter>Contact</a>
        </nav>

        <div class="nav-actions">
          <button class="enter-link" type="button" data-enter>
            <span>Enter</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h13M13 6l6 6-6 6" />
            </svg>
          </button>
        </div>
      </header>

      <section class="hero-copy" aria-labelledby="coverTitle">
        <p class="hero-kicker">Northwest A&F University </p>
        <h1 id="coverTitle" class="hero-title">黄文浩</h1>
        <p class="hero-line">厚德载物</p>
        <button id="enterButton" class="enter-button" type="button">
          进入主页
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h13M13 6l6 6-6 6" />
          </svg>
        </button>
      </section>

      <div class="side-index" aria-hidden="true">Modeling Interface</div>
      <div class="edge-caption" aria-hidden="true">
        <span>Mathematical Modeling</span>
        <small>Portfolio / Data Analysis</small>
      </div>
    </main>

    <script>
      (() => {
        const root = document.documentElement;
        const canvas = document.querySelector("#cloudCanvas");
        const ctx = canvas.getContext("2d");
        const enterTargets = document.querySelectorAll("[data-enter], #enterButton");
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        let width = 0;
        let height = 0;
        let points = [];
        let frame = 0;

        const setPointer = (x, y) => {
          const mx = Math.min(Math.max(x / Math.max(window.innerWidth, 1), 0), 1);
          const my = Math.min(Math.max(y / Math.max(window.innerHeight, 1), 0), 1);
          root.style.setProperty("--mx", mx.toFixed(3));
          root.style.setProperty("--my", my.toFixed(3));
          root.style.setProperty("--px", `${x.toFixed(1)}px`);
          root.style.setProperty("--py", `${y.toFixed(1)}px`);
        };

        const resize = () => {
          const ratio = Math.min(window.devicePixelRatio || 1, 1.6);
          const rect = canvas.getBoundingClientRect();
          width = Math.max(1, rect.width);
          height = Math.max(1, rect.height);
          canvas.width = Math.floor(width * ratio);
          canvas.height = Math.floor(height * ratio);
          ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

          const count = Math.min(150, Math.max(70, Math.floor((width * height) / 14000)));
          points = Array.from({ length: count }, (_, index) => {
            const row = index % 4;
            return {
              x: ((index * 37) % 100) / 100,
              y: 0.08 + row * 0.11 + (((index * 17) % 100) / 100) * 0.06,
              drift: 0.35 + (index % 9) * 0.05,
              size: 0.8 + (index % 3) * 0.25,
              alpha: 0.045 + (index % 5) * 0.012
            };
          });
        };

        const draw = () => {
          frame += 1;
          ctx.clearRect(0, 0, width, height);

          const time = frame * 0.006;
          const mx = Number.parseFloat(getComputedStyle(root).getPropertyValue("--mx")) || 0.5;
          const my = Number.parseFloat(getComputedStyle(root).getPropertyValue("--my")) || 0.5;
          const pullX = (mx - 0.5) * 18;
          const pullY = (my - 0.5) * 10;

          ctx.lineWidth = 1;
          ctx.strokeStyle = "rgba(35, 45, 52, 0.09)";
          for (let i = 0; i < 5; i += 1) {
            const y = height * (0.18 + i * 0.105) + Math.sin(time * 1.8 + i) * 7 + pullY * 0.45;
            ctx.beginPath();
            for (let x = -40; x <= width + 40; x += 34) {
              const wave = Math.sin(x * 0.012 + time * (1.4 + i * 0.12) + i) * (6 + i * 1.8);
              if (x === -40) ctx.moveTo(x, y + wave);
              else ctx.lineTo(x, y + wave);
            }
            ctx.stroke();
          }

          for (const point of points) {
            const x = ((point.x * width + Math.sin(time * point.drift + point.y * 9) * 18 + pullX) + width) % width;
            const y = point.y * height + Math.cos(time * point.drift + point.x * 12) * 7 + pullY;
            ctx.fillStyle = `rgba(35, 45, 52, ${point.alpha})`;
            ctx.beginPath();
            ctx.arc(x, y, point.size, 0, Math.PI * 2);
            ctx.fill();
          }

          if (!reduceMotion) requestAnimationFrame(draw);
        };

        const enter = (event) => {
          if (event) event.preventDefault();
          if (document.body.classList.contains("is-exiting")) return;
          document.body.classList.add("is-exiting");
          window.setTimeout(() => {
            window.location.href = "/app";
          }, 520);
        };

        document.addEventListener("pointermove", (event) => {
          setPointer(event.clientX, event.clientY);
        }, { passive: true });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Enter") enter(event);
        });

        enterTargets.forEach((target) => {
          target.addEventListener("click", enter);
        });

        resize();
        setPointer(window.innerWidth / 2, window.innerHeight / 2);
        draw();
        window.addEventListener("resize", resize, { passive: true });
      })();
    </script>
  </body>
</html>
