<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Luxury Tree v16.5 (Particle & Photo Hybrid)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Songti SC', 'SimSun', serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: #d4af37; }
        
        .elegant-btn {
            background: rgba(10, 10, 10, 0.85); border: 1px solid rgba(212, 175, 55, 0.4); 
            color: #d4af37; padding: 10px 15px; cursor: pointer; font-size: 12px;
            transition: 0.2s; pointer-events: auto; border-radius: 4px; margin-bottom: 5px;
        }
        .elegant-btn:hover { background: #d4af37; color: #000; }

        #left-sidebar { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; width: 220px; pointer-events: auto; }
        .panel { background: rgba(5, 5, 5, 0.8); padding: 15px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.2); }

        #webcam-wrapper { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; border: 1px solid #d4af37; border-radius: 4px; overflow: hidden; background: #000; }
        #webcam-canvas { width: 100%; height: 100%; transform: scaleX(-1); }

        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(212, 175, 55, 0.1); border-top: 2px solid #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/", "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm" } }
    </script>
</head>
<body>
    <div id="loader"><div class="spinner"></div><div style="color:#d4af37; margin-top:20px;">系统修复中...</div></div>
    
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="left-sidebar">
            <div class="panel">
                <h3 style="margin:0 0 10px 0;">混合粒子互动树</h3>
                <label class="elegant-btn" style="display:block; text-align:center;">
                    + 批量添加照片
                    <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
                </label>
                <div style="font-size:11px; color:#888; margin-top:10px;">
                    ✊ 聚合圣诞树 | ✋ 散开粒子<br>
                    👌 捏合查看随机照片
                </div>
            </div>
        </div>
    </div>

    <div id="webcam-wrapper"><canvas id="webcam-canvas"></canvas></div>
    <video id="webcam-video" autoplay playsinline muted style="display:none"></video>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        let scene, camera, renderer, composer, clock = new THREE.Clock();
        let mainGroup = new THREE.Group();
        let photoGroup = new THREE.Group();
        let particles = [];
        let handLandmarker, videoElement;
        let STATE = { mode: 'TREE', focusTarget: null, rotationY: 0 };

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.015);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(mainGroup);
            mainGroup.add(photoGroup);

            // 1. 创建原本的粒子装饰（球体、方块）
            createDecorations();
            
            // 2. 创建默认照片
            createDefaultPhotos();

            // 后处理
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            setupEvents();
            await initMediaPipe();
            animate();
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
        }

        function createDecorations() {
            const sphereGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const boxGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const goldMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1 });
            const redMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.5 });

            for (let i = 0; i < 800; i++) {
                const mesh = new THREE.Mesh(Math.random() > 0.5 ? sphereGeo : boxGeo, Math.random() > 0.5 ? goldMat : redMat);
                addParticle(mesh, 'DECO');
            }
        }

        function createDefaultPhotos() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,256,256);
            ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 10; ctx.strokeRect(10,10,236,236);
            ctx.fillStyle = '#d4af37'; ctx.font = '24px Arial'; ctx.textAlign = 'center';
            ctx.fillText("JOY TO WORLD", 128, 140);
            addPhotoMesh(canvas.toDataURL());
        }

        function addPhotoMesh(url) {
            const texture = new THREE.TextureLoader().load(url);
            const group = new THREE.Group();
            
            // 照片相框
            const frame = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 0.1), new THREE.MeshStandardMaterial({ color: 0xd4af37 }));
            const photo = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 3.8), new THREE.MeshBasicMaterial({ map: texture }));
            photo.position.z = 0.06;
            group.add(frame);
            group.add(photo);
            
            photoGroup.add(group);
            addParticle(group, 'PHOTO');
        }

        function addParticle(mesh, type) {
            const h = 40;
            const t = Math.random();
            const angle = t * Math.PI * 16;
            const r = 15 * (1 - t);
            
            const treePos = new THREE.Vector3(Math.cos(angle)*r, t*h - h/2, Math.sin(angle)*r);
            const scatterPos = new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);

            mesh.position.copy(scatterPos);
            mainGroup.add(mesh);
            
            particles.push({
                mesh: mesh,
                type: type,
                tree: treePos,
                scatter: scatterPos,
                rotSpeed: (Math.random()-0.5) * 2
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            
            STATE.rotationY += 0.4 * dt;
            mainGroup.rotation.y = STATE.rotationY;

            particles.forEach(p => {
                let targetPos = (STATE.mode === 'TREE') ? p.tree : p.scatter;
                
                if (STATE.mode === 'FOCUS' && p.mesh === STATE.focusTarget) {
                    const offset = new THREE.Vector3(0, 0, 35).applyQuaternion(camera.quaternion);
                    targetPos = new THREE.Vector3().copy(camera.position).add(offset);
                    p.mesh.lookAt(camera.position);
                } else {
                    p.mesh.position.lerp(targetPos, 0.05);
                    p.mesh.rotation.y += p.rotSpeed * dt;
                }
            });

            composer.render();
        }

        async function initMediaPipe() {
            videoElement = document.getElementById('webcam-video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            
            renderWebcamPreview();
            predictWebcam();
        }

        function renderWebcamPreview() {
            const canvas = document.getElementById('webcam-canvas');
            const ctx = canvas.getContext('2d');
            function draw() {
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                requestAnimationFrame(draw);
            }
            draw();
        }

        // --- 修复关键点：移除了多余的闭合括号 ---
        async function predictWebcam() {
            if (videoElement.readyState >= 2) {
                const result = handLandmarker.detectForVideo(videoElement, performance.now());
                if (result.landmarks && result.landmarks.length > 0) {
                    const lm = result.landmarks[0];
                    const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
                    const open = Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y);

                    if (pinch < 0.05) {
                        if (STATE.mode !== 'FOCUS') {
                            STATE.mode = 'FOCUS';
                            const photos = particles.filter(p => p.type === 'PHOTO');
                            STATE.focusTarget = photos[Math.floor(Math.random()*photos.length)].mesh;
                        }
                    } else if (open > 0.3) {
                        STATE.mode = 'SCATTER';
                        STATE.focusTarget = null;
                    } else {
                        STATE.mode = 'TREE';
                        STATE.focusTarget = null;
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.getElementById('file-input').addEventListener('change', (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => addPhotoMesh(ev.target.result);
                    reader.readAsDataURL(file);
                });
            });
        }

        init();
    </script>
</body>
</html>
