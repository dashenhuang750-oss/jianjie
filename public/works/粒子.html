<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 手势控制 3D 粒子系统</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 摄像头预览（可选，用于调试，默认隐藏或小窗口） */
        #video-preview {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 0px;
            height: 0px;
            border-radius: 8px;
            opacity: 0.7;
            transform: scaleX(-1);
            z-index: 2;
            pointer-events: none;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* 加载遮罩 */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 999;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 全屏按钮 */
        #fs-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        #fs-btn:hover { background: rgba(255,255,255,0.3); }

        /* 隐藏文件输入 */
        #file-input { display: none; }
    </style>
    <!-- 引入库 -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">正在初始化 AI 模型与粒子引擎...</div>
    </div>

    <video id="video-preview" playsinline></video>
    <div id="canvas-container"></div>
    <button id="fs-btn">⛶ 全屏模式</button>
    <input type="file" id="file-input" accept="image/*">

    <script>
        // --- 1. 全局配置与状态 ---
        const config = {
            particleCount: 15000,
            particleSize: 0.27,
            color1: '#00d2ff',
            color2: '#ff0099',
            gradient: true,
            handInteraction: true,
            sensitivity: 2.0, // 手势敏感度
            shape: 'heart'
        };

        const state = {
            handDistance: 0.5, // 0 到 1 之间
            targetScale: 1,
            isLoaded: false
        };

        let scene, camera, renderer, particles, geometry, material;
        let positions, targetPositions, colors; // 数据数组
        let handsMesh; // 用于调试手部位置
        
        // --- 2. Three.js 初始化 ---
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            
            // 相机设置
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 性能优化
            container.appendChild(renderer.domElement);

            // 初始化粒子系统
            createParticles();
            
            // 窗口大小调整
            window.addEventListener('resize', onWindowResize);
        }

        function createParticles() {
            if (particles) scene.remove(particles);

            geometry = new THREE.BufferGeometry();
            positions = new Float32Array(config.particleCount * 3);
            targetPositions = new Float32Array(config.particleCount * 3);
            colors = new Float32Array(config.particleCount * 3);

            // 初始随机分布
            for (let i = 0; i < config.particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // 使用着色器材质实现高性能渲染和圆形粒子
            const sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');

            material = new THREE.PointsMaterial({
                size: config.particleSize,
                vertexColors: true,
                map: sprite,
                alphaTest: 0.5,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // 生成初始形状
            generateShape(config.shape);
            updateColors();
        }

        // --- 3. 形状生成逻辑 ---
        function generateShape(type, imageData = null) {
            const count = config.particleCount;
            
            // 重置目标位置
            for (let i = 0; i < count; i++) {
                let x, y, z;
                const i3 = i * 3;

                if (type === 'heart') {
                    // 心形公式
                    const t = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()); 
                    // 2D 心形挤出一点厚度
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    x = hx * r;
                    y = hy * r;
                    z = (Math.random() - 0.5) * 5; 
                } 
                else if (type === 'saturn') {
                    // 土星 (球体 + 环)
                    if (i < count * 0.4) {
                        // 星球主体
                        const r = 6 * Math.cbrt(Math.random());
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        x = r * Math.sin(phi) * Math.cos(theta);
                        y = r * Math.sin(phi) * Math.sin(theta);
                        z = r * Math.cos(phi);
                    } else {
                        // 环
                        const r = 10 + Math.random() * 8;
                        const theta = Math.random() * Math.PI * 2;
                        x = r * Math.cos(theta);
                        z = r * Math.sin(theta); // 环在水平面
                        y = (Math.random() - 0.5) * 0.5;
                        
                        // 倾斜环
                        const angle = Math.PI / 6;
                        const _x = x * Math.cos(angle) - y * Math.sin(angle);
                        const _y = x * Math.sin(angle) + y * Math.cos(angle);
                        x = _x; y = _y;
                    }
                }
                else if (type === 'flower') {
                    // 简单的花朵参数方程
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI;
                    const r = 10 * Math.sin(5 * u); 
                    x = r * Math.sin(v) * Math.cos(u);
                    y = r * Math.sin(v) * Math.sin(u);
                    z = (Math.random() - 0.5) * 5;
                }
                else if (type === 'fireworks') {
                    // 随机爆炸球体
                    const r = Math.random() * 20;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }
                else if (type === 'image' && imageData) {
                    // 图片处理
                    const index = i % imageData.length;
                    x = imageData[index].x;
                    y = imageData[index].y;
                    z = (Math.random() - 0.5) * 2; // 扁平带点厚度
                }
                else {
                    // 默认球体
                    const r = 10 * Math.cbrt(Math.random());
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }

                targetPositions[i3] = x;
                targetPositions[i3 + 1] = y;
                targetPositions[i3 + 2] = z;
            }
        }

        function updateColors() {
            const c1 = new THREE.Color(config.color1);
            const c2 = new THREE.Color(config.color2);
            const colorAttr = geometry.attributes.color;

            for (let i = 0; i < config.particleCount; i++) {
                let mixedColor;
                if (config.gradient) {
                    // 根据Y轴位置渐变
                    const t = (targetPositions[i*3+1] + 10) / 20; // 归一化近似值
                    mixedColor = c1.clone().lerp(c2, Math.max(0, Math.min(1, t)));
                } else {
                    mixedColor = c1;
                }
                
                colorAttr.setXYZ(i, mixedColor.r, mixedColor.g, mixedColor.b);
            }
            colorAttr.needsUpdate = true;
        }

        // --- 4. 图片处理逻辑 ---
        function processImage(image) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 100; // 降低分辨率以匹配粒子数
            canvas.width = size;
            canvas.height = size;
            
            // 保持比例绘制
            const scale = Math.min(size / image.width, size / image.height);
            const w = image.width * scale;
            const h = image.height * scale;
            ctx.drawImage(image, (size - w)/2, (size - h)/2, w, h);
            
            const data = ctx.getImageData(0, 0, size, size).data;
            const validPixels = [];

            for(let y = 0; y < size; y++) {
                for(let x = 0; x < size; x++) {
                    const alpha = data[(y * size + x) * 4 + 3];
                    if (alpha > 128) {
                        validPixels.push({
                            x: (x - size/2) * 0.4, // 缩放系数
                            y: -(y - size/2) * 0.4 
                        });
                    }
                }
            }
            
            if (validPixels.length > 0) {
                generateShape('image', validPixels);
            }
        }

        // --- 5. MediaPipe Hands 集成 ---
        function initMediaPipe() {
            const videoElement = document.getElementById('video-preview');
            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            
            camera.start()
                .then(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                    state.isLoaded = true;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('loader-text').innerText = "摄像头访问失败，请允许摄像头权限或使用本地服务器。";
                });
        }

        function onHandResults(results) {
            if (!config.handInteraction) return;

            if (results.multiHandLandmarks.length === 2) {
                // 双手模式：计算两手距离
                const hand1 = results.multiHandLandmarks[0][0]; // 手腕点
                const hand2 = results.multiHandLandmarks[1][0]; // 手腕点
                
                // 简单的欧几里得距离
                const dx = hand1.x - hand2.x;
                const dy = hand1.y - hand2.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                // 平滑过渡
                state.handDistance = THREE.MathUtils.lerp(state.handDistance, distance, 0.1);
                
                // 映射距离到缩放 (0.1 -> 0.8 是比较正常的手势范围)
                // 距离大 -> 扩散/变大; 距离小 -> 聚合/变小
                state.targetScale = THREE.MathUtils.mapLinear(state.handDistance, 0.1, 0.8, 0.5, 2.5);
                
            } else if (results.multiHandLandmarks.length === 1) {
                // 单手模式：食指与拇指的距离（捏合）
                const thumb = results.multiHandLandmarks[0][4];
                const index = results.multiHandLandmarks[0][8];
                const dist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
                
                state.targetScale = THREE.MathUtils.mapLinear(dist, 0.02, 0.2, 0.5, 2.0);
            } else {
                // 无手势，恢复默认
                state.targetScale = THREE.MathUtils.lerp(state.targetScale, 1.0, 0.05);
            }
        }

        // --- 6. 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            if (!state.isLoaded) return;

            const time = Date.now() * 0.001;
            const positions = geometry.attributes.position.array;
            
            // 缓动系数
            const ease = 0.05;

            // 粒子运动逻辑
            for (let i = 0; i < config.particleCount; i++) {
                const i3 = i * 3;
                
                // 获取基础目标位置
                let tx = targetPositions[i3];
                let ty = targetPositions[i3 + 1];
                let tz = targetPositions[i3 + 2];

                // 应用手势缩放
                tx *= state.targetScale;
                ty *= state.targetScale;
                tz *= state.targetScale;

                // 添加微弱的噪点/漂浮感
                tx += Math.sin(time + positions[i3+1] * 0.05) * 0.2;
                ty += Math.cos(time + positions[i3] * 0.05) * 0.2;

                // 烟花特效：如果处于扩散状态，增加旋转
                if (config.shape === 'fireworks') {
                    const angle = time * 0.2;
                    const cos = Math.cos(angle);
                    const sin = Math.sin(angle);
                    const _x = tx;
                    tx = _x * cos - tz * sin;
                    tz = _x * sin + tz * cos;
                }

                // 更新当前位置 (Lerp)
                positions[i3] += (tx - positions[i3]) * ease;
                positions[i3 + 1] += (ty - positions[i3 + 1]) * ease;
                positions[i3 + 2] += (tz - positions[i3 + 2]) * ease;
            }

            geometry.attributes.position.needsUpdate = true;
            
            // 整体场景缓慢旋转
            particles.rotation.y += 0.001;

            renderer.render(scene, camera);
        }

        // --- 7. UI 构建 ---
        function initGUI() {
            const gui = new lil.GUI({ title: '控制面板' });
            
            const folderShape = gui.addFolder('模型变换');
            folderShape.add(config, 'shape', ['heart', 'saturn', 'flower', 'fireworks', 'buddha']).name('选择形状').onChange(val => {
                if (val === 'buddha') {
                    // 使用内置的简易佛像坐标生成或提示上传
                    alert("佛像模式通常需要模型文件，这里将模拟一个莲花座形态。");
                    generateShape('flower'); // 简化处理，使用花朵模拟
                } else {
                    generateShape(val);
                }
                updateColors();
            });
            
            const obj = { upload: () => document.getElementById('file-input').click() };
            folderShape.add(obj, 'upload').name('📷 上传图片生成');

            const folderColor = gui.addFolder('颜色外观');
            folderColor.addColor(config, 'color1').name('颜色 A').onChange(updateColors);
            folderColor.addColor(config, 'color2').name('颜色 B').onChange(updateColors);
            folderColor.add(config, 'gradient').name('开启渐变').onChange(updateColors);
            folderColor.add(config, 'particleSize', 0.1, 10).name('粒子大小').onChange(v => material.size = v);

            const folderInteract = gui.addFolder('交互设置');
            folderInteract.add(config, 'handInteraction').name('开启摄像头控制');
            
            // 处理文件上传
            document.getElementById('file-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => processImage(img);
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // 辅助函数
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('fs-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // --- 启动 ---
        initThree();
        initGUI();
        initMediaPipe(); // 这会请求摄像头权限
        animate();

    </script>
</body>
</html>
