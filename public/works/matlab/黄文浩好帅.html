<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄文浩好帅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #000428, #004e92);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }
        
        .text-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .char {
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px currentColor;
            animation: jump 1.5s infinite alternate, glow 2s infinite alternate;
            display: inline-block;
            transform-origin: bottom;
        }
        
        .char:nth-child(1) { animation-delay: 0s; color: #FF5252; }
        .char:nth-child(2) { animation-delay: 0.1s; color: #FF9800; }
        .char:nth-child(3) { animation-delay: 0.2s; color: #FFEB3B; }
        .char:nth-child(4) { animation-delay: 0.3s; color: #4CAF50; }
        .char:nth-child(5) { animation-delay: 0.4s; color: #2196F3; }
        .char:nth-child(6) { animation-delay: 0.5s; color: #9C27B0; }
        
        @keyframes jump {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-30px) scale(1.2);
            }
        }
        
        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
                opacity: 1;
            }
            50% {
                text-shadow: 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor;
                opacity: 0.8;
            }
        }
        
        .subtitle {
            font-size: 1.8rem;
            color: white;
            margin-top: 30px;
            animation: pulse 3s infinite;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        
        .heart {
            position: absolute;
            font-size: 2rem;
            color: #ff4081;
            animation: heartFloat 8s infinite linear;
            opacity: 0;
        }
        
        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.2);
                opacity: 0;
            }
        }
        
        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            animation: explode 2s infinite;
        }
        
        @keyframes explode {
            0% {
                transform: translate(0, 0);
                opacity: 1;
                width: 5px;
                height: 5px;
            }
            100% {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
                width: 2px;
                height: 2px;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .char {
                font-size: 3.5rem;
            }
            .subtitle {
                font-size: 1.4rem;
            }
        }
        
        @media (max-width: 480px) {
            .char {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .text-container {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <div class="text-container">
            <div class="char">黄</div>
            <div class="char">文</div>
            <div class="char">浩</div>
            <div class="char">好</div>
            <div class="char">帅</div>
            <div class="char">!</div>
        </div>
        <div class="subtitle">✨ 全场最帅，无人能敌 ✨</div>
    </div>

    <script>
        // 创建背景粒子
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // 随机大小
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // 随机颜色
                const colors = ['#FF5252', '#FF9800', '#FFEB3B', '#4CAF50', '#2196F3', '#9C27B0'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // 随机位置
                particle.style.left = `${Math.random() * 100}vw`;
                
                // 随机动画延迟和持续时间
                particle.style.animationDelay = `${Math.random() * 15}s`;
                particle.style.animationDuration = `${10 + Math.random() * 10}s`;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // 创建漂浮爱心
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            const heartCount = 20;
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤';
                
                // 随机位置
                heart.style.left = `${Math.random() * 100}vw`;
                
                // 随机动画延迟和持续时间
                heart.style.animationDelay = `${Math.random() * 8}s`;
                heart.style.animationDuration = `${5 + Math.random() * 5}s`;
                
                // 随机大小
                const size = 1 + Math.random() * 1.5;
                heart.style.fontSize = `${size}rem`;
                
                heartsContainer.appendChild(heart);
            }
        }
        
        // 创建烟花效果
        function createFirework(x, y) {
            const firework = document.createElement('div');
            firework.className = 'firework';
            
            // 随机颜色
            const colors = ['#FF5252', '#FF9800', '#FFEB3B', '#4CAF50', '#2196F3', '#9C27B0'];
            firework.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            // 设置位置
            firework.style.left = `${x}px`;
            firework.style.top = `${y}px`;
            
            // 随机爆炸方向
            const angle = Math.random() * Math.PI * 2;
            const distance = 50 + Math.random() * 100;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            firework.style.setProperty('--tx', `${tx}px`);
            firework.style.setProperty('--ty', `${ty}px`);
            
            document.body.appendChild(firework);
            
            // 动画结束后移除元素
            setTimeout(() => {
                firework.remove();
            }, 2000);
        }
        
        // 随机创建烟花
        function createRandomFireworks() {
            setInterval(() => {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                
                // 一次创建多个烟花粒子
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        createFirework(x, y);
                    }, i * 100);
                }
            }, 2000);
        }
        
        // 鼠标点击创建烟花
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createFirework(e.clientX, e.clientY);
                }, i * 50);
            }
        });
        
        // 初始化
        window.addEventListener('load', () => {
            createParticles();
            createHearts();
            createRandomFireworks();
            
            // 添加键盘事件，按空格键触发更多效果
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            createFirework(
                                Math.random() * window.innerWidth,
                                Math.random() * window.innerHeight
                            );
                        }, i * 50);
                    }
                }
            });
        });
        
        // 窗口大小变化时重新调整
        window.addEventListener('resize', () => {
            document.getElementById('particles').innerHTML = '';
            document.getElementById('hearts').innerHTML = '';
            createParticles();
            createHearts();
        });
    </script>
</body>
</html>
