<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111714" />
    <meta name="description" content="黄文浩的个人网站，展示数学建模、统计建模、数据分析、Desmos 可视化、竞赛经历与公共服务经历。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="黄文浩 | 数理建模 · 统计建模 · 数据分析" />
    <meta property="og:description" content="黄文浩的个人网站，展示数学建模、统计建模、数据分析、Desmos 可视化、竞赛经历与公共服务经历。" />
    <title>黄文浩 | 数理建模 · 统计建模 · 数据分析</title>
    <style>
      body.is-booting .app-shell {
        opacity: 0;
        visibility: hidden;
      }

      body.is-booting .signature-canvas {
        opacity: 0;
      }
    </style>
    <link rel="stylesheet" href="/styles.css?v=26" />
  </head>
  <body class="is-booting">
    <noscript>
      <style>
        body.is-booting .app-shell {
          opacity: 1;
          visibility: visible;
        }
      </style>
    </noscript>
    <div class="mountain-bg" aria-hidden="true">
      <div class="mountain-layer"></div>
      <canvas id="cloudCanvas" class="cloud-canvas"></canvas>
    </div>
    <canvas id="signatureCanvas" class="signature-canvas" aria-hidden="true"></canvas>

    <main class="app-shell">
      <header class="site-header">
        <button id="homeButton" class="brand-button" type="button" aria-label="返回首页">
          <span id="brandInitial">P</span>
          <strong id="brandName">你的名字</strong>
        </button>

        <div class="header-actions">
          <a class="cover-return" href="/">首页</a>
          <span id="availability" class="status-pill">开放交流</span>
          <button id="themeToggle" class="icon-button" type="button" aria-label="切换明暗模式">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v2.2M12 18.8V21M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M3 12h2.2M18.8 12H21M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" />
              <circle cx="12" cy="12" r="4" />
            </svg>
          </button>
        </div>
      </header>

      <section id="homeView" class="home-view" aria-labelledby="profile-name">
        <aside class="identity-stage">
          <div class="stage-visual" aria-label="互动模块星图">
            <canvas id="stageCanvas" class="stage-canvas"></canvas>
            <div id="stageNodes" class="stage-nodes"></div>
            <div class="stage-readout">
              <span id="stageReadoutLabel">Profile Map</span>
              <strong id="stageReadoutTitle"></strong>
            </div>
          </div>

          <div class="stage-meta">
            <span id="location">中国</span>
            <span>Modeling Portfolio</span>
          </div>

          <p id="profile-role" class="role">数理建模 / 统计建模 / 数据分析</p>
          <h1 id="profile-name">你的名字</h1>
          <p id="headline" class="headline">把复杂问题拆解成可以理解、可以验证、可以呈现的模型。</p>

          <div class="hero-actions">
            <button class="primary-action" type="button" data-open-module="projects">
              <span>查看项目</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h13M13 6l6 6-6 6" />
              </svg>
            </button>
            <button class="secondary-action" type="button" data-open-module="contact">联系我</button>
          </div>
        </aside>

        <section class="profile-console" aria-label="个人模块">
          <div class="console-heading">
            <div>
              <p class="eyebrow">Profile Studio</p>
              <h2>进入个人主页</h2>
            </div>
            <span id="moduleCount" class="module-count">0 modules</span>
          </div>

          <div id="moduleGrid" class="module-grid" aria-label="模块入口"></div>
          <div id="factGrid" class="fact-strip" aria-label="个人重点"></div>
          <div id="linkList" class="link-list" aria-label="联系方式"></div>
        </section>
      </section>

      <section id="moduleView" class="module-view" aria-hidden="true">
        <div class="module-shell">
          <header class="module-toolbar">
            <button id="backButton" class="back-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H6M12 6l-6 6 6 6" />
              </svg>
              <span>返回</span>
            </button>
            <div id="moduleProgress" class="module-progress" aria-hidden="true"></div>
          </header>

          <div class="module-layout">
            <nav id="moduleNav" class="module-nav" aria-label="切换模块"></nav>

            <article class="module-detail">
              <div id="moduleTextContent" class="module-text-content"></div>

              <section id="assistantWorkspace" class="assistant-workspace" hidden aria-labelledby="chat-title">
                <header class="chat-header">
                  <div>
                    <p class="eyebrow">Ask Me Anything</p>
                    <h2 id="chat-title">问我一个问题</h2>
                  </div>
                </header>

                <div id="quickQuestions" class="quick-questions" aria-label="快速问题"></div>
                <div id="messages" class="messages" aria-live="polite"></div>

                <form id="chatForm" class="composer">
                  <textarea
                    id="messageInput"
                    name="message"
                    rows="1"
                    maxlength="1200"
                    autocomplete="off"
                    placeholder="比如：你最适合做什么项目？"
                  ></textarea>
                  <button id="sendButton" class="send-button" type="submit" aria-label="发送问题">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M5 12h13M13 6l6 6-6 6" />
                    </svg>
                  </button>
                </form>
              </section>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const placeholderName = "你的名字";
        const reveal = () => {
          requestAnimationFrame(() => {
            document.body.classList.remove("is-booting");
          });
        };
        const isReady = () => {
          const name = document.querySelector("#profile-name");
          const modules = document.querySelector("#moduleGrid");
          return Boolean(
            name
            && name.textContent.trim()
            && name.textContent.trim() !== placeholderName
            && modules
            && modules.children.length > 0
          );
        };
        const observer = new MutationObserver(() => {
          if (!isReady()) return;
          observer.disconnect();
          reveal();
        });

        observer.observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true
        });

        if (isReady()) {
          observer.disconnect();
          reveal();
        }

        window.setTimeout(() => {
          observer.disconnect();
          reveal();
        }, 3500);
      })();
    </script>
    <script src="/app.js?v=24" defer></script>
  </body>
</html>
