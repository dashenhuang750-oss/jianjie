<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080b0c" />
    <meta name="description" content="黄文浩的互动式个人简介网站，包含模块化介绍、留言板和 AI 风格问答。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="黄文浩 - AI 个人简介" />
    <meta property="og:description" content="一个可以互动、提问和浏览模块的个人简介网站。" />
    <title>个人简介 - AI 问答</title>
    <link rel="stylesheet" href="/styles.css?v=21" />
  </head>
  <body>
    <canvas id="signatureCanvas" class="signature-canvas" aria-hidden="true"></canvas>

    <main class="app-shell">
      <header class="site-header">
        <button id="homeButton" class="brand-button" type="button" aria-label="返回首页">
          <span id="brandInitial">P</span>
          <strong id="brandName">你的名字</strong>
        </button>

        <div class="header-actions">
          <span id="availability" class="status-pill">开放交流</span>
          <button id="themeToggle" class="icon-button" type="button" aria-label="切换明暗模式">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v2.2M12 18.8V21M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M3 12h2.2M18.8 12H21M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" />
              <circle cx="12" cy="12" r="4" />
            </svg>
          </button>
        </div>
      </header>

      <section id="homeView" class="home-view" aria-labelledby="profile-name">
        <aside class="identity-stage">
          <div class="stage-visual" aria-label="互动模块星图">
            <canvas id="stageCanvas" class="stage-canvas"></canvas>
            <div id="stageNodes" class="stage-nodes"></div>
            <div class="stage-readout">
              <span id="stageReadoutLabel">Profile Map</span>
              <strong id="stageReadoutTitle">移动鼠标探索模块</strong>
            </div>
          </div>

          <div class="stage-meta">
            <span id="location">中国</span>
            <span>Interactive profile</span>
          </div>

          <p id="profile-role" class="role">AI 产品设计师 / 创作者</p>
          <h1 id="profile-name">你的名字</h1>
          <p id="headline" class="headline">把复杂想法做成清晰、漂亮、可用的产品。</p>

          <div class="hero-actions">
            <button class="primary-action" type="button" data-open-module="assistant">
              <span>问我问题</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h13M13 6l6 6-6 6" />
              </svg>
            </button>
            <button class="secondary-action" type="button" data-open-module="about">查看简介</button>
          </div>
        </aside>

        <section class="profile-console" aria-label="个人模块">
          <div class="console-heading">
            <div>
              <p class="eyebrow">Profile Studio</p>
              <h2>选择一个模块进入</h2>
            </div>
            <span id="moduleCount" class="module-count">0 modules</span>
          </div>

          <div id="moduleGrid" class="module-grid" aria-label="模块入口"></div>
          <div id="factGrid" class="fact-strip" aria-label="个人重点"></div>
          <div id="linkList" class="link-list" aria-label="联系方式"></div>
        </section>
      </section>

      <section id="moduleView" class="module-view" aria-hidden="true">
        <div class="module-shell">
          <header class="module-toolbar">
            <button id="backButton" class="back-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H6M12 6l-6 6 6 6" />
              </svg>
              <span>返回</span>
            </button>
            <div id="moduleProgress" class="module-progress" aria-hidden="true"></div>
          </header>

          <div class="module-layout">
            <nav id="moduleNav" class="module-nav" aria-label="切换模块"></nav>

            <article class="module-detail">
              <div id="moduleTextContent" class="module-text-content"></div>

              <section id="assistantWorkspace" class="assistant-workspace" hidden aria-labelledby="chat-title">
                <header class="chat-header">
                  <div>
                    <p class="eyebrow">Ask Me Anything</p>
                    <h2 id="chat-title">问我一个问题</h2>
                  </div>
                </header>

                <div id="quickQuestions" class="quick-questions" aria-label="快速问题"></div>
                <div id="messages" class="messages" aria-live="polite"></div>

                <form id="chatForm" class="composer">
                  <textarea
                    id="messageInput"
                    name="message"
                    rows="1"
                    maxlength="1200"
                    autocomplete="off"
                    placeholder="比如：你最适合做什么项目？"
                  ></textarea>
                  <button id="sendButton" class="send-button" type="submit" aria-label="发送问题">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M5 12h13M13 6l6 6-6 6" />
                    </svg>
                  </button>
                </form>
              </section>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js?v=21" defer></script>
  </body>
</html>
